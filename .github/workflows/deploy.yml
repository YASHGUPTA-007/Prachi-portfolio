name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Stop old container (if exists)
        run: docker stop my-portfolio || true

      - name: Remove old container (if exists)
        run: docker rm my-portfolio || true

      - name: Build new Docker image
        run: docker build -t prachi-portfolio .

      - name: Run new container
        run: docker run -d -p 80:3000 --name my-portfolio prachi-portfolio
